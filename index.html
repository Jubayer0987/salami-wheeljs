<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salami Wheel 🎉</title>

<style>
body {
  text-align: center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  font-family: Arial;
}

.container {
  position: relative;
  display: inline-block;
  margin-top: 30px;
}

#wheel {
  border-radius: 50%;
  border: 6px solid white;
  transition: transform 4s ease-out;
}

#spinBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 20px;
  border-radius: 50%;
  border: none;
  background: #ff4757;
  color: white;
  cursor: pointer;
}

#spinBtn:disabled {
  background: gray;
}

#result {
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🎉 Jubayer Eid Salam 🎉</h2>
<p id="mode"></p>

<div class="container">
  <canvas id="wheel"></canvas>
  <button id="spinBtn" onclick="spin()">SPIN</button>
</div>

<h3 id="result"></h3>

<!-- SOUND -->
<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
// 🎯 PROBABILITY SYSTEM
let options = [
 "100 Taka","200 Taka","300 Taka","400 Taka",
 "100 Taka","200 Taka","300 Taka","400 Taka",
 "100 Taka","200 Taka","300 Taka","400 Taka",
 "100 Taka","200 Taka","300 Taka","400 Taka",
 "100 Taka","200 Taka","300 Taka",

 "500 Taka" // 🎁 5%
];

let colors = ["#ff4757","#1e90ff","#2ed573","#ffa502"];
let rotation = 0;

// 🔐 ADMIN MODE
let params = new URLSearchParams(window.location.search);
let isAdmin = params.get("admin") === "true";

document.getElementById("mode").innerText =
  isAdmin ? "🟢 Admin Mode" : "👤 User Mode";

// 🎨 DRAW (HD TEXT)
function drawWheel(){
 let canvas = document.getElementById("wheel");
 let ctx = canvas.getContext("2d");

 let size = 320;
 let scale = window.devicePixelRatio;

 canvas.width = size * scale;
 canvas.height = size * scale;
 canvas.style.width = size + "px";
 canvas.style.height = size + "px";

 ctx.scale(scale, scale);

 let arc = Math.PI * 2 / options.length;

 for(let i=0;i<options.length;i++){
   let angle = i * arc;

   ctx.beginPath();
   ctx.fillStyle = colors[i % colors.length];
   ctx.moveTo(size/2,size/2);
   ctx.arc(size/2,size/2,size/2,angle,angle+arc);
   ctx.fill();

   ctx.save();
   ctx.fillStyle = "#fff";
   ctx.font = "bold 15px Arial";
   ctx.textAlign = "center";
   ctx.textBaseline = "middle";

   ctx.translate(size/2,size/2);
   ctx.rotate(angle + arc/2);

   ctx.fillText(options[i], size/3, 0);

   ctx.restore();
 }
}

// 🎯 SPIN
function spin(){
 if(!isAdmin && localStorage.getItem("spun")){
   alert("❌ Already spun!");
   return;
 }

 document.getElementById("spinSound").play();

 let rand = Math.floor(Math.random()*options.length);
 let deg = 360/options.length;

 let spinDeg = 3600 + (rand * deg);
 rotation += spinDeg;

 document.getElementById("wheel").style.transform =
   "rotate("+rotation+"deg)";

 setTimeout(()=>{
   document.getElementById("spinSound").pause();
   document.getElementById("winSound").play();

   let result = options[rand];
   document.getElementById("result").innerText = "🎉 You got: " + result;

   // 🎁 SPECIAL EFFECT for 100
   if(result === "100 Taka"){
     document.getElementById("result").innerText += " 🤑 JACKPOT!";
   }

   if(!isAdmin){
     localStorage.setItem("spun","yes");
     document.getElementById("spinBtn").disabled = true;
   }

 },4000);
}

// 🔒 LOCK USER
if(!isAdmin && localStorage.getItem("spun")){
 document.getElementById("spinBtn").disabled = true;
 document.getElementById("result").innerText = "❌ Already Spun!";
}

drawWheel();
</script>

</body>
</html>
