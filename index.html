<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salami Wheel 🎉</title>

<style>
body {
  text-align: center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  font-family: Arial;
}

h2 {
  margin-top: 20px;
}

#wheel {
  border-radius: 50%;
  border: 6px solid white;
  transition: transform 4s ease-out;
}

#spinBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 12px 20px;
  border-radius: 50%;
  border: none;
  background: #ff4757;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.container {
  position: relative;
  display: inline-block;
  margin-top: 30px;
}

#arrow {
  font-size: 30px;
}

#result {
  margin-top: 15px;
  font-size: 20px;
}
</style>
</head>

<body>

<h2>🎉 Jubayer Eid Salam 🎉</h2>
<div id="arrow">⬇️</div>

<div class="container">
  <canvas id="wheel" width="300" height="300"></canvas>
  <button id="spinBtn" onclick="spin()">SPIN</button>
</div>

<h3 id="result"></h3>

<!-- Sound -->
<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
let options = [
 "5 Taka","10 Taka","12 Taka","15 Taka",
 "15.5 Taka","2.5 Taka","6 Taka","20 Taka",
 "18 Taka","23 Taka","25 Taka","28 Taka",
 "10 Taka","8 Taka","50 Taka"
];

let colors = ["#ff4757","#1e90ff","#2ed573","#ffa502"];
let rotation = 0;

function drawWheel(){
 let canvas = document.getElementById("wheel");
 let ctx = canvas.getContext("2d");

 let arc = Math.PI * 2 / options.length;

 for(let i=0;i<options.length;i++){
   let angle = i * arc;

   ctx.beginPath();
   ctx.fillStyle = colors[i % colors.length];
   ctx.moveTo(150,150);
   ctx.arc(150,150,150,angle,angle+arc);
   ctx.fill();

   ctx.save();
   ctx.fillStyle = "white";
   ctx.translate(150,150);
   ctx.rotate(angle + arc/2);
   ctx.fillText(options[i], 70, 5);
   ctx.restore();
 }
}

function spin(){
 if(localStorage.getItem("spun")){
   alert("❌ Already spun!");
   return;
 }

 let spinSound = document.getElementById("spinSound");
 let winSound = document.getElementById("winSound");

 spinSound.play();

 let rand = Math.floor(Math.random()*options.length);
 let deg = 360/options.length;

 let spinDeg = 3600 + (rand * deg);
 rotation += spinDeg;

 document.getElementById("wheel").style.transform =
   "rotate("+rotation+"deg)";

 setTimeout(()=>{
   spinSound.pause();
   winSound.play();

   let result = options[rand];
   document.getElementById("result").innerText = "🎉 You got: " + result;

   localStorage.setItem("spun","yes");
   document.getElementById("spinBtn").disabled = true;

 },4000);
}

if(localStorage.getItem("spun")){
 document.getElementById("spinBtn").disabled = true;
 document.getElementById("result").innerText = "❌ Already Spun!";
}

drawWheel();
</script>

</body>
</html>
